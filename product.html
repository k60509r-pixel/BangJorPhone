<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detail Produk - BangJorPhone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar topbar-logo">
    <img class="logo" src="assets/banner.jpg" alt="JorPhone - HP Bekas Berkualitas"
         onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
    <div id="logo-fallback" class="logo-fallback" style="display:none;">BangJorPhone</div>
  </header>

  <main>
    <a class="back-link" href="index.html">&larr; Kembali ke katalog</a>
    <p id="state-message" class="state-message">Memuat produk...</p>

    <div id="detail-content" style="display:none;">
      <div id="media-carousel-wrap" class="media-carousel-wrap">
        <div id="media-carousel" class="media-carousel"></div>
        <div id="media-indicator" class="media-indicator" hidden></div>
      </div>

      <div class="detail-card">
        <h2 id="detail-model"></h2>
        <p id="detail-price" class="price"></p>
        <table class="spec-table">
          <tbody id="spec-body"></tbody>
        </table>
      </div>

      <section id="related-products" class="related-products" hidden>
        <h3>Model serupa lainnya</h3>
        <div id="related-grid" class="related-grid"></div>
      </section>
    </div>
  </main>

  <div id="buy-bar" class="buy-bar" style="display:none;">
    <a id="buy-button" class="buy-button" target="_blank" rel="noopener">Beli via WhatsApp</a>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/render.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>
